# Save this file to: .github/workflows/daily_scrape.yml
# in your GitHub repository
#
# What this does:
#   - Runs your procurement scraper every day at 7am UTC
#   - Commits the new CSV back to your repo automatically
#   - Free on GitHub (up to 2,000 minutes/month on free tier)
#
# Setup steps:
#   1. Create a GitHub repo
#   2. Add procurement_scraper.py and requirements.txt to the repo root
#   3. Add this file to .github/workflows/
#   4. Push — GitHub Actions will handle the rest

name: Daily Procurement Scraper

on:
  schedule:
    - cron: '0 7 * * *'   # 7:00 AM UTC every day (8am BST in summer)
  workflow_dispatch:       # also allows manual trigger from GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        run: python procurement_scraper.py

      - name: Commit results to repo
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add procurement_latest_*.csv procurement.db
          git diff --staged --quiet || git commit -m "Daily procurement data: $(date +'%Y-%m-%d')"
          git push
